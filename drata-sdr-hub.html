function CopyButton({ text }) {
  const [copied, setCopied] = useState(false);
  const copy = () => {
    if (navigator.clipboard) {
      navigator.clipboard.writeText(text).then(() => { setCopied(true); setTimeout(()=>setCopied(false),1500); });
    } else {
      const ta = document.createElement('textarea'); ta.value = text;
      document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta);
      setCopied(true); setTimeout(()=>setCopied(false),1500);
    }
  };
  return (
    <button onClick={copy} style={{ background:copied?"#059669":"#1E2235", border:"1px solid #2D3151", borderRadius:6, padding:"4px 10px", cursor:"pointer", fontSize:11, color:copied?"#fff":"#64748B", fontWeight:600, whiteSpace:"nowrap", transition:"all 0.15s", minWidth:58, flexShrink:0 }}>
      {copied ? "✓ Done" : "Copy"}
    </button>
  );
}
